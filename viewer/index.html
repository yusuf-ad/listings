<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listing Manager — Thessaloniki Properties</title>
  <meta name="description" content="View and edit property listing JSON files for Thessaloniki student housing.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <span>Listing Manager</span>
        </div>
        <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="sidebar-search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Search listings...">
      </div>

      <nav class="sidebar-nav" id="sidebarNav">
        <!-- Populated by JS -->
      </nav>

      <div class="sidebar-footer">
        <span id="listingCount">0 listings</span>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main" id="main">
      <!-- Empty state -->
      <div class="empty-state" id="emptyState">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <h2>Select a listing</h2>
        <p>Choose a property from the sidebar to view and edit its details.</p>
      </div>

      <!-- Detail View -->
      <div class="detail-view hidden" id="detailView">
        <!-- Top Bar -->
        <div class="detail-topbar">
          <div class="detail-breadcrumb" id="breadcrumb"></div>
          <div class="detail-actions">
            <button class="btn btn-ghost" id="btnCopyJson" title="Copy JSON">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
              <span>Copy JSON</span>
            </button>
            <button class="btn btn-ghost" id="btnDownload" title="Download JSON">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              <span>Download</span>
            </button>
            <button class="btn btn-primary" id="btnSave" title="Save changes" disabled>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
              </svg>
              <span>Save</span>
            </button>
          </div>
        </div>

        <!-- Tabs -->
        <div class="tabs" id="tabs">
          <button class="tab active" data-tab="overview">Overview</button>
          <button class="tab" data-tab="about">About</button>
          <button class="tab" data-tab="amenities">Amenities</button>
          <button class="tab" data-tab="pricing">Pricing & Rules</button>
          <button class="tab" data-tab="seo">SEO</button>
          <button class="tab" data-tab="json">Raw JSON</button>
        </div>

        <!-- Tab Panels -->
        <div class="tab-panels">
          <!-- Overview -->
          <div class="tab-panel active" id="panel-overview"></div>
          <!-- About -->
          <div class="tab-panel" id="panel-about"></div>
          <!-- Amenities -->
          <div class="tab-panel" id="panel-amenities"></div>
          <!-- Pricing & Rules -->
          <div class="tab-panel" id="panel-pricing"></div>
          <!-- SEO -->
          <div class="tab-panel" id="panel-seo"></div>
          <!-- Raw JSON -->
          <div class="tab-panel" id="panel-json"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
